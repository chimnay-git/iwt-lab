<html>
<head>
<title>QUESTION 12</title>
<script language="JavaScript">
   function generateFibonacci(n) {
        let fib = [];

        if (n <= 0) return fib;
        fib[0] = 0;
        if (n > 1) {
            fib[1] = 1;
        }
   
        for (let i = 2; i < n; i++) {
         
            fib[i] = fib[i - 1] + fib[i - 2];
        }

        return fib;
    }

    let n = 10;
    let result = generateFibonacci(n);

    document.write("First " + n + " Fibonacci numbers:<br>");
    document.write("<b>" + result.join(", ") + "</b>");
</script>
</head>
<body bgcolor="white" text="brown">
</body>
</html>
